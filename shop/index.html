<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IM Sportswear — Tienda online próximamente." />
    <title>Próximamente — IM Sportswear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css?v=2.2" />
    <style>
      .coming-wrap {
        min-height: calc(100vh - 64px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 24px;
        background: #fff;
      }
      .coming-eyebrow {
        font-size: 0.65rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 24px;
      }
      .coming-title {
        font-family: var(--font-display);
        font-size: clamp(3.5rem, 10vw, 7rem);
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1;
        margin: 0 0 20px;
        color: var(--navy);
      }
      .coming-sub {
        font-size: 0.85rem;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-bottom: 48px;
      }
      .coming-form {
        display: flex;
        gap: 0;
        max-width: 380px;
        width: 100%;
      }
      .coming-form input {
        flex: 1;
        border: 1px solid var(--line);
        border-right: none;
        padding: 13px 16px;
        font-family: var(--font-ui);
        font-size: 0.8rem;
        color: var(--navy);
        outline: none;
        background: #fff;
      }
      .coming-form input::placeholder { color: var(--muted); }
      .coming-form button {
        background: var(--navy);
        color: #fff;
        border: none;
        padding: 13px 22px;
        font-family: var(--font-ui);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s;
      }
      .coming-form button:hover { background: var(--navy-deep); }
      .coming-back {
        margin-top: 40px;
        font-size: 0.68rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .coming-back a { color: var(--navy); }
      .coming-back a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
        <nav class="site-nav" aria-label="Principal">
          <ul id="site-menu" class="menu-left">
            <li><a href="https://imsportswear.cl/#tenis">Tenis</a></li>
            <li><a href="https://imsportswear.cl/#running">Running</a></li>
            <li><a href="https://imsportswear.cl/#urban">Urban</a></li>
            <li><a href="https://imsportswear.cl/#accesorios">Accesorios</a></li>
          </ul>
        </nav>
        <div class="brand-mark">
          <a href="https://imsportswear.cl" class="brand-logo">IM</a>
          <span class="brand-tagline">Classic · Sport · Modern Life</span>
        </div>
        <div class="nav-actions">
          <a class="bag-link" href="#" aria-label="Tienda">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 8h12l-1 12H7L6 8Zm3-1V6a3 3 0 1 1 6 0v1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="coming-wrap">
        <p class="coming-eyebrow">IM Sportswear · Colección 2026</p>
        <h1 class="coming-title">Próximamente</h1>
        <p class="coming-sub">Classic · Sport · Modern Life</p>
        <form class="coming-form" onsubmit="return false;">
          <input type="email" placeholder="Tu correo electrónico" />
          <button type="submit">Avisar</button>
        </form>
        <p class="coming-back">
          <a href="https://imsportswear.cl">← Volver al inicio</a>
        </p>
      </div>
    </main>

    <script>
      const toggle = document.querySelector('.menu-toggle');
      const menu = document.getElementById('site-menu');
      if (toggle && menu) {
        toggle.addEventListener('click', () => {
          const open = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!open));
          menu.classList.toggle('is-open', !open);
        });
      }
    </script>
  </body>
</html>
